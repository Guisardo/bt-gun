name: desktop-companion

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/desktop-companion.yml"
      - "desktop-companion/**"

permissions:
  contents: read

jobs:
  build-test-package:
    name: Build, test, and package desktop companion
    runs-on: windows-2022
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Test and package
        shell: pwsh
        run: gradle -p desktop-companion test distZip --no-daemon --console=plain

      - name: Upload runnable distribution
        uses: actions/upload-artifact@v4
        with:
          name: desktop-companion-windows-lan-visualizer
          path: desktop-companion/build/distributions/desktop-companion.zip
          if-no-files-found: error
